<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ReconBubble</title>
  <link rel="stylesheet" href="/static/app.css"/>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand"><a href="/">ReconBubble</a></div>
      <img class="firegif" src="/static/fire.gif" alt="retro fire"/>
    </div>
  <nav class="nav">
      <a href="/" {{ 'class=current' if request.url.path == '/' }}>Stats</a>
      <a href="/scope" {{ 'class=current' if request.url.path == '/scope' }}>Scope</a>
      <a href="/assets" {{ 'class=current' if request.url.path == '/assets' }}>Assets</a>
      <a href="/cloud" {{ 'class=current' if request.url.path == '/cloud' }}>Cloud</a>
      <a href="/users" {{ 'class=current' if request.url.path == '/users' }}>Users</a>
      <div class="nav-dropdown" id="osintDropdown">
        <a href="#" class="nav-dropbtn">OSINT ▾</a>
        <div class="nav-dropdown-content">
          <a href="/social" {{ 'class=current' if request.url.path == '/social' }}>Social Media</a>
          <a href="/emails" {{ 'class=current' if request.url.path == '/emails' }}>Emails</a>
          <a href="/docs" {{ 'class=current' if request.url.path == '/docs' }}>Documents & Exif</a>
          <a href="/dns" {{ 'class=current' if request.url.path == '/dns' }}>DNS</a>
          <a href="/smtp" {{ 'class=current' if request.url.path == '/smtp' }}>SMTP</a>
        </div>
      </div>
      <a href="/urls" {{ 'class=current' if request.url.path == '/urls' }}>URLs</a>
      <a href="/subdomains" {{ 'class=current' if request.url.path == '/subdomains' }}>Subdomains</a>
      <a class="btn" href="/upload">Upload</a>
    </nav>
    <img class="firegif firegif-right" src="/static/fire.gif" alt="retro fire"/>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <div id="sidebarOverlay" class="overlay hidden"></div>
  <aside id="sidebar" class="sidebar hidden" aria-hidden="true">
    <div class="sidebarHeader">
      <div id="sidebarTitle" class="sidebarTitle">Details</div>
      <button id="sidebarClose" class="btn" type="button">Close</button>
    </div>
    <div id="sidebarBody" class="sidebarBody"></div>
  </aside>

  {% block scripts %}{% endblock %}
  <script src="/static/sidebar.js?v=2"></script>
  <script>
    const osintDropdown = document.getElementById("osintDropdown");
    let dropdownTimeout;
    osintDropdown.addEventListener("mouseenter", () => {
      clearTimeout(dropdownTimeout);
      osintDropdown.classList.add("show");
    });
    osintDropdown.addEventListener("mouseleave", () => {
      dropdownTimeout = setTimeout(() => {
        osintDropdown.classList.remove("show");
      }, 1200);
    });
  </script>
</body>
</html>
