{% extends "base.html" %}
{% block content %}
<h1>Unauthenticated Checklist</h1>
<p class="muted" style="margin-bottom:20px;">Unauthenticated external reconnaissance checklist.</p>

<style>
.checklist-container { display:flex; flex-direction:column; padding:20px; position:relative; }
.checklist-row {
  display:flex; align-items:flex-start; padding:12px 0; position:relative; z-index:1;
}
.checklist-row::before {
  content:''; position:absolute; left:8px; top:0; bottom:0; width:2px; background:#444;
}
.checklist-row:last-child::before { background:linear-gradient(to bottom, #444, transparent); }
.check-item-wrapper {
  display:flex; gap:20px; margin-left:10px;
}
.item-box {
  display:flex; flex-direction:column;
}
.item-header {
  display:flex; align-items:center; gap:12px; padding:14px 20px;
  border-radius:8px 8px 0 0; font-weight:600; color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  cursor:pointer; transition:all 0.2s;
}
.item-header:hover { transform:translateX(4px); }
.item-header input[type="checkbox"] { width:18px; height:18px; cursor:pointer; accent-color:#fff; }
.item-header span { font-size:14px; }
.item-header.checked { filter:brightness(0.7); }
.item-header.disabled { filter:grayscale(0.8) brightness(0.6); opacity:0.7; }
.item-body {
  display:flex; gap:8px; padding:8px 14px; border-radius:0 0 8px 8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.adcs .item-header, .adcs .item-body { background:linear-gradient(135deg, #e74c3c, #c0392b); }
.ldap .item-header, .ldap .item-body { background:linear-gradient(135deg, #3498db, #2980b9); }
.smb .item-header, .smb .item-body { background:linear-gradient(135deg, #9b59b6, #8e44ad); }
.phase-label {
  position:absolute; left:0; top:-5px; font-size:12px; font-weight:700;
  color:#666; text-transform:uppercase; letter-spacing:1px;
}
.item-body label {
  font-size:12px; font-weight:600; cursor:pointer; padding:0;
  border-radius:6px; transition:all 0.2s;
}
.item-body label:hover { opacity:0.85; }
.item-body input { display:none; }
.item-body span {
  display:inline-block; padding:6px 12px; border-radius:6px;
  background:rgba(0,0,0,0.3); color:#fff;
}
.item-body input[value="unchecked"]:checked + span { background:#3498db; }
.item-body input[value="vuln"]:checked + span { background:#e74c3c; }
.item-body input[value="notvuln"]:checked + span { background:#555; }
.vuln-box {
  padding:14px 20px; border-radius:8px; font-weight:600;
  color:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.3); position:relative;
}
.vuln-box::before {
  content:'→'; position:absolute; left:-22px; top:50%; transform:translateY(-50%);
  font-size:20px; color:#666;
}
#adcs-vuln-box { background:linear-gradient(135deg, #e74c3c, #c0392b); }
#ldap-vuln-box { background:linear-gradient(135deg, #3498db, #2980b9); }
#smb-vuln-box { background:linear-gradient(135deg, #9b59b6, #8e44ad); }
</style>

<div class="card" style="min-height:400px;">
  <div class="checklist-container">
    <span class="phase-label" style="left:30px;">Enumeration</span>
    
    <!-- Placeholder for unauthenticated items -->
    <div class="checklist-row">
      <div class="check-item-wrapper adcs">
        <div class="item-box">
          <label class="item-header" data-key="adcs">
            <input type="checkbox" />
            <span>Coming soon...</span>
          </label>
        </div>
      </div>
    </div>
    
  </div>
</div>
{% endblock %}
