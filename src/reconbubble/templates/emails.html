{% extends "base.html" %}
{% block content %}
<h1>Emails</h1>
<div class="card" style="margin-bottom:20px;">
  <a class="btn" href="/emails/export">Export in-scope emails</a>
</div>
<table>
  <thead><tr><th>Scope</th><th>Email</th><th>Domain</th><th>Sensitive</th></tr></thead>
  <tbody>
    {% for e in rows %}
      <tr>
        <td>{% if e.in_scope %}<span class="pill inscope">IN</span>{% else %}<span class="pill outscope">OUT</span>{% endif %}</td>
        <td>{{ e.email }}</td>
        <td>{{ e.domain }}</td>
        <td>{% if e.sensitive %}<span class="sensitive-banner">Sensitive</span>{% else %}<span class="muted">-</span>{% endif %}</td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
