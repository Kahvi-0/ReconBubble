{% extends "base.html" %}
{% block content %}
<h1>Documents</h1>
<table>
  <thead><tr><th>Title</th><th>Type</th><th>Size</th><th>Added</th><th>Actions</th></tr></thead>
  <tbody>
    {% for d in rows %}
      <tr>
        <td><a href="/doc/{{ d.id }}">{{ d.title }}</a></td>
        <td>{{ d.mime }}</td>
        <td>{{ d.size_bytes }}</td>
        <td>{{ d.created_at }}</td>
        <td>
          <form action="/api/doc/delete" method="post" onsubmit="return confirm('Delete this document and its metadata?');" style="display:inline;">
            <input type="hidden" name="doc_id" value="{{ d.id }}"/>
            <button class="btn" type="submit">Delete</button>
          </form>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
